name: Run Tests

on:
  push:
    branches:
      - main
      - '1.x'
  pull_request:
    branches:
      - main
      - '1.x'

jobs:
  pest:
    name: Pest Tests - PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ 8.4 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, curl, libxml, pdo, sqlite
          tools: composer

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Tests (lint, refactor, type-coverage, etc.)
        run: php ./vendor/bin/pest