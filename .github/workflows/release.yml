name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@873c7452cadb7c034694a1282227095d93fbdf92
        with:
          tool: git-cliff

      - name: Generate CHANGELOG
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: git-cliff --config cliff.toml --tag "${{ github.ref_name }}" --output CHANGELOG.md

      - name: Commit CHANGELOG
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          BRANCH="$(git branch -r --contains "${{ github.ref_name }}" --format='%(refname:short)' | grep -E '^origin/[0-9]+\.x$' | head -n1 | sed 's|^origin/||')"
          BRANCH="${BRANCH:-1.x}"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(changelog): ${{ github.ref_name }}"
          git push origin "HEAD:${BRANCH}" || true

      - name: Extract release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git-cliff --config cliff.toml --latest --strip all > /tmp/release-notes.md
          {
            echo 'body<<RELEASE_NOTES_EOF'
            cat /tmp/release-notes.md
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            --latest

      - name: Send GitHub Release to Discord
        uses: SethCohen/github-releases-to-discord@24d166886aee4646d448c8a389ff9e1ebcab3682
        with:
          webhook_url: ${{ secrets.DISCORD }}
          release_name: ${{ github.ref_name }}
          release_body: ${{ steps.notes.outputs.body }}
          release_html_url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          color: "2105893"
          username: "Laravel Sisp"
          avatar_url: "https://avatars.githubusercontent.com/u/116525492?s=96&v=4"
          content: "||@everyone||"
          footer_title: "Laravel Sisp"
          footer_icon_url: "https://avatars.githubusercontent.com/u/116525492?s=96&v=4"
          footer_timestamp: true
